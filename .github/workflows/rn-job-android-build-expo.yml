name: RN — Android EAS build

on:
  workflow_call:
    inputs:
      eas_mode:
        description: local (runner) or cloud (EAS)
        type: string
        default: cloud
    secrets:
      EXPO_TOKEN:
        required: false

jobs:
  eas-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore Firebase client config
        uses: ./.github/actions/restore-firebase-client-config
        with:
          firebase_flavor: dev
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST_DEV: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV }}
          GOOGLE_SERVICE_INFO_PLIST_DIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DIST }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: bash .github/scripts/install_js_deps.sh auto
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then echo "EXPO_TOKEN required"; exit 1; fi
          if [ "${{ inputs.eas_mode }}" = "local" ]; then
            npx eas-cli build --platform android --non-interactive --local
          else
            npx eas-cli build --platform android --non-interactive --no-wait
          fi
