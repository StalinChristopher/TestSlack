# Code scanning upload requires GitHub Advanced Security (or public repo). Without it, this
# workflow fails at the upload step. Triggers are manual-only; turn push/PR/schedule back on
# when your org enables code scanning.
name: CodeQL JavaScript

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
