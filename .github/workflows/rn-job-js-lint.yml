name: RN — JS lint & types

on:
  workflow_call:

jobs:
  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install JS dependencies
        run: bash .github/scripts/install_js_deps.sh auto
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: TypeScript
        run: npm run typecheck
