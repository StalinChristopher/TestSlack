# Expo EAS — iOS build on runner (macOS + Xcode). Requires EXPO_TOKEN and EAS creds.
name: RN — iOS EAS build (local)

on:
  workflow_call:
    inputs:
      profile:
        description: EAS build profile (matches eas.json)
        type: string
        default: production
    secrets:
      EXPO_TOKEN:
        required: true

env:
  # Expo SDK 55 requires Xcode 26+; EAS defaults to 26.2. Same pin for bare + Expo iOS jobs.
  XCODE_VERSION: "26.2"

jobs:
  eas-ios-local:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Restore Firebase client config
        uses: ./.github/actions/restore-firebase-client-config
        with:
          firebase_flavor: dev
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST_DEV: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV }}
          GOOGLE_SERVICE_INFO_PLIST_DIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DIST }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: bash .github/scripts/install_js_deps.sh auto
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler: "2.4.12"
      - name: bundle install
        run: bundle install
      - uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
      - name: pod install
        run: bundle exec pod install --project-directory=ios
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS iOS (local)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli build --platform ios --profile "${{ inputs.profile }}" --non-interactive --local
