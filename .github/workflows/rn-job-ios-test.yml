# iOS unit tests (workspace + scheme) and xccov line-coverage gate.
name: RN — iOS native test & coverage

on:
  workflow_call:
    inputs:
      ios_workspace:
        type: string
        default: ios/TestSlackDev.xcworkspace
      ios_scheme:
        type: string
        default: TestSlackDev
      simulator_destination:
        type: string
        default: auto
        description: auto, or a full -destination string for xcodebuild
      coverage_threshold_percent:
        type: string
        default: "0"
        description: 0 to skip; otherwise minimum line coverage (0–100)

env:
  # Expo SDK 55 requires Xcode 26+; EAS defaults to 26.2. Same pin for bare + Expo iOS jobs.
  XCODE_VERSION: "26.2"

jobs:
  test-and-coverage:
    name: iOS xcodebuild test
    runs-on: macos-15
    env:
      SCHEME: ${{ inputs.ios_scheme }}
      WS: ${{ inputs.ios_workspace }}
      SIMULATOR_DESTINATION: ${{ inputs.simulator_destination }}
      COVERAGE_THRESHOLD_PERCENT: ${{ inputs.coverage_threshold_percent }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore Firebase client config
        uses: ./.github/actions/restore-firebase-client-config
        with:
          firebase_flavor: dev
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GOOGLE_SERVICE_INFO_PLIST_DEV: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DEV }}
          GOOGLE_SERVICE_INFO_PLIST_DIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_DIST }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: bash .github/scripts/install_js_deps.sh auto
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler: "2.4.12"
      - name: bundle install
        run: bundle install
      - uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock', 'ios/Podfile') }}
      - name: pod install
        run: bundle exec pod install --project-directory=ios
      - name: Run unit tests with coverage
        run: |
          set -euo pipefail
          if [ -z "${SIMULATOR_DESTINATION:-}" ] || [ "${SIMULATOR_DESTINATION}" = "auto" ]; then
            DEST="$(python3 "${{ github.workspace }}/.github/scripts/ios_first_iphone_sim_udid.py")"
          else
            DEST="${SIMULATOR_DESTINATION}"
          fi
          echo "Using -destination ${DEST}"
          xcodebuild test \
            -workspace "$WS" \
            -scheme "$SCHEME" \
            -destination "${DEST}" \
            -enableCodeCoverage YES \
            -derivedDataPath DerivedDataCI \
            -resultBundlePath TestResults.xcresult
      - name: Enforce minimum line coverage
        if: ${{ inputs.coverage_threshold_percent != '0' }}
        run: |
          python3 << 'PY'
          import json, os, subprocess, sys

          threshold = float(os.environ["COVERAGE_THRESHOLD_PERCENT"]) / 100.0
          r = subprocess.run(
              ["xcrun", "xccov", "view", "--report", "--json", "TestResults.xcresult"],
              capture_output=True,
              text=True,
              check=True,
          )
          data = json.loads(r.stdout)

          def line_coverage_from_targets(targets):
              cov_lines = 0
              exe_lines = 0
              for t in targets:
                  name = t.get("name") or ""
                  if not name.endswith(".app"):
                      continue
                  cov_lines += int(t.get("coveredLines") or 0)
                  exe_lines += int(t.get("executableLines") or 0)
              if exe_lines == 0:
                  return None
              return cov_lines / exe_lines

          line_cov = data.get("lineCoverage")
          if line_cov is None and data.get("targets"):
              line_cov = line_coverage_from_targets(data["targets"])

          if line_cov is not None and line_cov > 1.0:
              line_cov = line_cov / 100.0

          if line_cov is None:
              print("Could not compute line coverage from xccov JSON; inspect TestResults.xcresult")
              print(json.dumps(data, indent=2)[:4000])
              sys.exit(1)

          print(f"Line coverage: {line_cov:.2%} (minimum {threshold:.0%})")
          if line_cov + 1e-9 < threshold:
              sys.exit(1)
          PY
